<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfePRO - Gestión de Clases</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
        }
        .nav-active { color: #4f46e5 !important; }
        .hidden { display: none; }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        input, select { font-size: 16px !important; }
    </style>
</head>
<body class="text-slate-900 pb-24">

    <!-- HEADER COMPACTO -->
    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-40 p-4">
        <div class="flex justify-between items-center max-w-lg mx-auto">
            <h1 class="text-xl font-extrabold tracking-tight italic text-indigo-600">PROFE<span class="text-slate-400 font-light">PRO</span></h1>
            <div class="text-right">
                <p class="text-[10px] text-slate-400 font-bold uppercase">Deuda Total</p>
                <p id="stat-pending-global" class="text-lg font-black text-rose-500 leading-none">0€</p>
            </div>
        </div>
    </header>

    <main class="max-w-lg mx-auto p-4 space-y-8">

        <!-- SECCIÓN 1: ALUMNOS -->
        <section id="section-students" class="space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="font-extrabold text-xl">Mis Alumnos</h3>
                <button onclick="openModal('studentModal')" class="bg-indigo-600 text-white w-10 h-10 rounded-2xl shadow-lg flex items-center justify-center">
                    <i class="fas fa-user-plus text-sm"></i>
                </button>
            </div>
            <div id="students-grid" class="grid gap-3"></div>
        </section>

        <!-- SECCIÓN 2: BALANCE (NUEVO DASHBOARD) -->
        <section id="section-balance" class="hidden space-y-6">
            <h3 class="font-extrabold text-xl px-1">Rendimiento Mensual</h3>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-indigo-600 text-white p-5 rounded-[2rem] shadow-xl shadow-indigo-100">
                    <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest">Ingresos Mes</p>
                    <h4 id="balance-month-money" class="text-2xl font-black">0€</h4>
                    <p id="balance-week-money" class="text-[10px] mt-1 opacity-80 font-medium">+0€ esta semana</p>
                </div>
                <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Horas Totales</p>
                    <h4 id="balance-month-hours" class="text-2xl font-black text-slate-800">0h</h4>
                    <p id="balance-week-hours" class="text-[10px] mt-1 text-slate-400 font-medium">+0h esta semana</p>
                </div>
            </div>

            <!-- Contador de Clases -->
            <div class="bg-emerald-500 text-white p-6 rounded-[2rem] shadow-lg shadow-emerald-100 flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Clases dadas este mes</p>
                    <h4 id="balance-month-count" class="text-3xl font-black">0</h4>
                </div>
                <div class="bg-white/20 p-4 rounded-2xl text-2xl">
                    <i class="fas fa-chalkboard-teacher"></i>
                </div>
            </div>

            <div class="space-y-3">
                <h5 class="text-xs font-black uppercase text-rose-500 tracking-widest px-1">Pagos Pendientes</h5>
                <div id="pending-list" class="space-y-2"></div>
            </div>
        </section>

        <!-- SECCIÓN 3: CLASES -->
        <section id="section-classes" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="font-extrabold text-xl">Historial</h3>
                <button onclick="openModal('classModal')" class="bg-slate-800 text-white px-5 py-2.5 rounded-2xl text-xs font-black">
                    + NUEVA CLASE
                </button>
            </div>
            <div id="recent-classes-list" class="space-y-3"></div>
        </section>

    </main>

    <!-- NAV INFERIOR -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-4 z-50 shadow-lg">
        <button onclick="showSection('students')" id="nav-students" class="nav-link flex flex-col items-center gap-1 text-slate-300">
            <i class="fas fa-users text-xl"></i>
            <span class="text-[9px] font-black uppercase">Alumnos</span>
        </button>
        <button onclick="showSection('balance')" id="nav-balance" class="nav-link flex flex-col items-center gap-1 text-slate-300">
            <i class="fas fa-chart-line text-xl"></i>
            <span class="text-[9px] font-black uppercase">Balance</span>
        </button>
        <button onclick="showSection('classes')" id="nav-classes" class="nav-link flex flex-col items-center gap-1 text-slate-300">
            <i class="fas fa-list text-xl"></i>
            <span class="text-[9px] font-black uppercase">Clases</span>
        </button>
    </nav>

    <!-- MODAL ALUMNO -->
    <div id="studentModal" class="modal fixed inset-0 bg-slate-900/40 hidden z-[100] flex items-end justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-8 animate-slide-up">
            <h3 class="text-2xl font-black mb-6">Nuevo Alumno</h3>
            <form id="studentForm" class="space-y-4">
                <input type="text" id="input-student-name" class="w-full p-4 bg-slate-50 border-none rounded-2xl" placeholder="Nombre completo" required>
                <input type="number" id="input-student-rate" class="w-full p-4 bg-slate-50 border-none rounded-2xl" placeholder="Precio / hora" required>
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="closeModal('studentModal')" class="flex-1 font-bold text-slate-400">Cancelar</button>
                    <button type="submit" class="flex-[2] bg-indigo-600 text-white font-black py-4 rounded-2xl">GUARDAR</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL CLASE -->
    <div id="classModal" class="modal fixed inset-0 bg-slate-900/40 hidden z-[100] flex items-end justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-8 animate-slide-up">
            <h3 class="text-2xl font-black mb-6">Registrar Clase</h3>
            <form id="classForm" class="space-y-4">
                <select id="input-class-student" class="w-full p-4 bg-slate-50 border-none rounded-2xl appearance-none" required></select>
                <div class="flex gap-3">
                    <input type="date" id="input-class-date" class="w-1/2 p-4 bg-slate-50 border-none rounded-2xl" required>
                    <input type="number" step="0.5" id="input-class-duration" class="w-1/2 p-4 bg-slate-50 border-none rounded-2xl" value="1">
                </div>
                <div class="bg-indigo-50 p-4 rounded-2xl flex items-center gap-3">
                    <input type="checkbox" id="input-class-paid" class="w-5 h-5 rounded text-indigo-600 border-none">
                    <label for="input-class-paid" class="text-sm font-bold text-indigo-700 italic">¿Pagado ahora?</label>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl">REGISTRAR</button>
            </form>
        </div>
    </div>

    <script>
        let students = JSON.parse(localStorage.getItem('students')) || [];
        let classes = JSON.parse(localStorage.getItem('classes')) || [];

        function showSection(sectionId) {
            document.querySelectorAll('main > section').forEach(sec => sec.classList.add('hidden'));
            document.getElementById(`section-${sectionId}`).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(btn => btn.classList.remove('nav-active'));
            document.getElementById(`nav-${sectionId}`).classList.add('nav-active');
            if(sectionId === 'balance') updateBalance();
        }

        function openModal(id) { 
            if(id === 'classModal' && students.length === 0) return alert("Añade un alumno primero");
            document.getElementById(id).classList.remove('hidden'); 
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        document.getElementById('studentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            students.push({ id: Date.now().toString(), name: document.getElementById('input-student-name').value, rate: parseFloat(document.getElementById('input-student-rate').value) });
            saveData(); renderAll(); closeModal('studentModal'); e.target.reset();
        });

        document.getElementById('classForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const sId = document.getElementById('input-class-student').value;
            classes.push({ id: Date.now().toString(), studentId: sId, studentName: students.find(s => s.id === sId).name, date: document.getElementById('input-class-date').value, duration: parseFloat(document.getElementById('input-class-duration').value), paid: document.getElementById('input-class-paid').checked });
            saveData(); renderAll(); closeModal('classModal'); e.target.reset();
        });

        function updateBalance() {
            const now = new Date();
            const startOfWeek = new Date(now);
            startOfWeek.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1));
            startOfWeek.setHours(0,0,0,0);
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).getTime();

            let wMoney = 0, wHours = 0, mMoney = 0, mHours = 0, mCount = 0;

            classes.forEach(c => {
                const cTime = new Date(c.date).getTime();
                const total = c.duration * (students.find(s => s.id === c.studentId)?.rate || 0);
                if(cTime >= startOfWeek.getTime()) { wMoney += total; wHours += c.duration; }
                if(cTime >= startOfMonth) { mMoney += total; mHours += c.duration; mCount++; }
            });

            document.getElementById('balance-month-money').innerText = `${mMoney}€`;
            document.getElementById('balance-week-money').innerText = `+${wMoney}€ esta semana`;
            document.getElementById('balance-month-hours').innerText = `${mHours}h`;
            document.getElementById('balance-week-hours').innerText = `+${wHours}h esta semana`;
            document.getElementById('balance-month-count').innerText = mCount;
            renderPendingList();
        }

        function renderPendingList() {
            const list = document.getElementById('pending-list');
            list.innerHTML = '';
            students.forEach(s => {
                const debt = classes.filter(c => c.studentId === s.id && !c.paid).reduce((sum, c) => sum + (c.duration * s.rate), 0);
                if(debt > 0) {
                    list.innerHTML += `<div class="bg-rose-50 p-4 rounded-2xl flex justify-between items-center border border-rose-100"><div><p class="text-xs font-black text-rose-700">${s.name}</p><p class="text-[10px] text-rose-400">Deuda: ${debt}€</p></div><button onclick="settleAll('${s.id}')" class="bg-white text-rose-600 text-[10px] px-4 py-2 rounded-xl font-black">SALDAR</button></div>`;
                }
            });
        }

        function settleAll(sId) {
            classes.forEach(c => { if(c.studentId === sId) c.paid = true; });
            saveData(); renderAll(); updateBalance();
        }

        function renderAll() {
            const grid = document.getElementById('students-grid'); grid.innerHTML = '';
            let globalPending = 0;
            students.forEach(s => {
                const debt = classes.filter(c => c.studentId === s.id && !c.paid).reduce((sum, c) => sum + (c.duration * s.rate), 0);
                globalPending += debt;
                grid.innerHTML += `<div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600 font-black text-sm">${s.name.charAt(0)}</div><div><h4 class="font-bold text-sm">${s.name}</h4><p class="text-[9px] text-slate-400 font-black uppercase mt-1">${s.rate}€/H</p></div></div><span class="text-[10px] font-black px-2 py-1 rounded-lg ${debt > 0 ? 'bg-rose-50 text-rose-600' : 'bg-emerald-50 text-emerald-600'}">${debt > 0 ? `DEBE ${debt}€` : 'AL DÍA'}</span></div>`;
            });
            document.getElementById('stat-pending-global').innerText = `${globalPending}€`;
            const list = document.getElementById('recent-classes-list'); list.innerHTML = '';
            [...classes].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 10).forEach(c => {
                list.innerHTML += `<div class="bg-white p-4 rounded-2xl flex justify-between items-center border-l-4 ${c.paid ? 'border-emerald-400' : 'border-rose-400'}"><div><p class="font-bold text-sm text-slate-800">${c.studentName}</p><p class="text-[10px] text-slate-400">${c.date} · ${c.duration}h</p></div><button onclick="togglePaid('${c.id}')" class="text-xl ${c.paid ? 'text-emerald-500' : 'text-slate-200'}"><i class="fas ${c.paid ? 'fa-check-circle' : 'fa-circle-dollar-to-slot'}"></i></button></div>`;
            });
            document.getElementById('input-class-student').innerHTML = students.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        }

        function togglePaid(id) { const idx = classes.findIndex(c => c.id === id); classes[idx].paid = !classes[idx].paid; saveData(); renderAll(); }
        function saveData() { localStorage.setItem('students', JSON.stringify(students)); localStorage.setItem('classes', JSON.stringify(classes)); }
        window.onload = () => { renderAll(); showSection('students'); };
    </script>
</body>
</html>
