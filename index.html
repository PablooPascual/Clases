<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Clases</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --bg2: #16161c;
    --bg3: #1e1e27;
    --bg4: #26262f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0eff4;
    --text2: #9996aa;
    --text3: #5c5a6b;
    --accent: #7c6cff;
    --accent2: #5f52d6;
    --accent-soft: rgba(124,108,255,0.12);
    --green: #34d399;
    --green-soft: rgba(52,211,153,0.1);
    --amber: #fbbf24;
    --amber-soft: rgba(251,191,36,0.1);
    --red: #f87171;
    --red-soft: rgba(248,113,113,0.08);
    --blue: #60a5fa;
    --blue-soft: rgba(96,165,250,0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 6px;
    --font: 'DM Sans', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(124,108,255,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 85% 100%, rgba(96,165,250,0.1) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Ccircle cx='30' cy='30' r='1'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 16px 80px; }

  /* TOPBAR */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 0 24px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .topbar-title { font-size: 16px; font-weight: 500; letter-spacing: -0.02em; }
  .topbar-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  select.month-sel {
    font-family: var(--font);
    font-size: 13px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 7px 12px;
    border-radius: var(--radius-sm);
    outline: none;
    cursor: pointer;
    letter-spacing: -0.01em;
  }
  select.month-sel:focus { border-color: var(--accent); }

  .btn {
    font-family: var(--font);
    font-size: 13px;
    font-weight: 400;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    transition: all .15s;
    letter-spacing: -0.01em;
  }
  .btn:hover { background: var(--bg4); color: var(--text); border-color: var(--border2); }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .btn-sm { font-size: 12px; padding: 4px 10px; }

  /* METRICS */
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .metric {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .metric::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 2px 2px 0 0;
  }
  .metric.m-green::before { background: var(--green); }
  .metric.m-amber::before { background: var(--amber); }
  .metric.m-blue::before { background: var(--blue); }
  .metric.m-purple::before { background: var(--accent); }
  .metric-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
  }
  .metric-val {
    font-size: 26px;
    font-weight: 300;
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .metric.m-green .metric-val { color: var(--green); }
  .metric.m-amber .metric-val { color: var(--amber); }
  .metric.m-blue .metric-val { color: var(--blue); }
  .metric.m-purple .metric-val { color: var(--accent); }

  /* LAYOUT MAIN */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 12px;
  }

  /* CARD */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-head {
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .card-head-title {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  /* FILTERS */
  .filters { display: flex; gap: 4px; flex-wrap: wrap; }
  .filter-btn {
    font-family: var(--font);
    font-size: 11px;
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: all .15s;
    letter-spacing: -0.01em;
  }
  .filter-btn:hover { color: var(--text2); border-color: var(--border2); }
  .filter-btn.on { background: var(--accent-soft); border-color: var(--accent); color: #c5beff; }

  /* TABLE */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 480px; }
  th {
    padding: 8px 14px;
    text-align: left;
    font-size: 10px;
    font-weight: 500;
    color: var(--text3);
    background: var(--bg3);
    text-transform: uppercase;
    letter-spacing: .07em;
    white-space: nowrap;
  }
  td {
    padding: 11px 14px;
    font-size: 13px;
    letter-spacing: -0.01em;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr.past td { opacity: .6; }
  tr.past td .badge-pend { background: rgba(251,191,36,0.07); color: #8a7540; }
  tr.future { background: rgba(124,108,255,0.03); }

  .date-cell { color: var(--text3); font-size: 12px; white-space: nowrap; }
  .date-cell .time { font-size: 11px; color: var(--text3); display: block; margin-top: 1px; }
  .future .date-cell { color: var(--text2); }

  .name-cell { font-weight: 500; }
  .total-cell { font-weight: 500; font-variant-numeric: tabular-nums; }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 400;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    letter-spacing: 0;
  }
  .badge-paid { background: var(--green-soft); color: var(--green); }
  .badge-pend { background: var(--amber-soft); color: var(--amber); }
  .badge-future { background: var(--accent-soft); color: #c5beff; font-size: 10px; }

  .tag-past {
    display: inline-block;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--text3);
    margin-left: 4px;
  }
  .tag-future {
    display: inline-block;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: #a89fff;
    margin-left: 4px;
  }

  .row-actions { display: flex; gap: 10px; }
  .row-actions button {
    font-family: var(--font);
    font-size: 11px;
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    padding: 0;
    transition: color .12s;
    letter-spacing: -0.01em;
  }
  .row-actions button:hover { color: var(--text); }
  .row-actions button.pay-btn:hover { color: var(--green); }
  .row-actions button.del-btn:hover { color: var(--red); }

  .empty-row td {
    text-align: center;
    padding: 32px;
    color: var(--text3);
    font-size: 13px;
  }

  /* SIDEBAR */
  .sidebar { display: flex; flex-direction: column; gap: 12px; }

  .alumno-list { padding: 10px 12px; display: flex; flex-direction: column; gap: 5px; }
  .alumno-item {
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    background: var(--bg3);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    transition: background .12s;
  }
  .alumno-item:hover { background: var(--bg4); }
  .alumno-name { font-size: 13px; font-weight: 500; letter-spacing: -0.01em; color: var(--text); }
  .alumno-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .alumno-debt { font-size: 12px; font-weight: 500; color: var(--amber); }
  .alumno-ok { font-size: 12px; color: var(--green); }
  .alumno-actions { display: flex; gap: 6px; margin-top: 4px; }

  .debt-box {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
  }
  .debt-label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text3);
    margin-bottom: 4px;
  }
  .debt-val {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: -0.04em;
    color: var(--amber);
  }
  .debt-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* MODALS */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
    backdrop-filter: blur(4px);
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 24px;
    width: 100%;
    max-width: 420px;
    position: relative;
  }
  .modal h3 {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
  }
  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    transition: color .12s;
  }
  .modal-close:hover { color: var(--text); }

  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    font-family: var(--font);
    font-size: 13px;
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color .12s;
    letter-spacing: -0.01em;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn-full { width: 100%; margin-top: 6px; padding: 10px; font-size: 14px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg4);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: all .2s;
    pointer-events: none;
    z-index: 200;
    letter-spacing: -0.01em;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* SECTION DIVIDER */
  .section-label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text3);
    padding: 8px 14px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
  }
  .dot-future { background: var(--accent); }
  .dot-past { background: var(--text3); }

  /* RESPONSIVE */
  @media (max-width: 860px) {
    .main-grid { grid-template-columns: 1fr; }
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .sidebar { flex-direction: row; flex-wrap: wrap; }
    .sidebar .card { flex: 1 1 280px; }
  }
  @media (max-width: 520px) {
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .metric-val { font-size: 22px; }
    .topbar-right { width: 100%; justify-content: flex-end; }
    .btn { font-size: 12px; padding: 6px 11px; }
  }
  @media (max-width: 380px) {
    .metrics { grid-template-columns: 1fr 1fr; }
    .metric { padding: 12px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-dot"></div>
      <span class="topbar-title">Mis clases</span>
    </div>
    <div class="topbar-right">
      <select class="month-sel" id="monthSel"></select>
      <button class="btn" onclick="openModal('studentModal')">+ Alumno</button>
      <button class="btn btn-primary" onclick="openClassModal()">+ Clase</button>
    </div>
  </div>

  <div class="metrics">
    <div class="metric m-green">
      <div class="metric-label">Cobrado</div>
      <div class="metric-val" id="statIncome">0€</div>
    </div>
    <div class="metric m-amber">
      <div class="metric-label">Pendiente</div>
      <div class="metric-val" id="statPending">0€</div>
    </div>
    <div class="metric m-blue">
      <div class="metric-label">Horas</div>
      <div class="metric-val" id="statHours">0h</div>
    </div>
    <div class="metric m-purple">
      <div class="metric-label">Clases</div>
      <div class="metric-val" id="statCount">0</div>
    </div>
  </div>

  <div class="main-grid">
    <div>
      <div class="card">
        <div class="card-head">
          <span class="card-head-title">Clases</span>
          <div class="filters">
            <button class="filter-btn on" data-f="all">Todas</button>
            <button class="filter-btn" data-f="pending">Pendientes</button>
            <button class="filter-btn" data-f="paid">Pagadas</button>
            <button class="filter-btn" data-f="future">Futuras</button>
          </div>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:90px">Fecha</th>
                <th>Alumno</th>
                <th style="width:55px">Horas</th>
                <th style="width:65px">Total</th>
                <th style="width:100px">Estado</th>
                <th style="width:110px"></th>
              </tr>
            </thead>
            <tbody id="classesBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="card" style="flex:1">
        <div class="card-head">
          <span class="card-head-title">Alumnos</span>
          <span id="studentCount" style="font-size:11px;color:var(--text3)">0 activos</span>
        </div>
        <div class="alumno-list" id="studentsList"></div>
        <div class="debt-box">
          <div class="debt-label">Deuda total</div>
          <div class="debt-val" id="totalDebt">0€</div>
          <div class="debt-sub" id="totalDebtSub">Sin saldo pendiente</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CLASE -->
<div class="overlay" id="classModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('classModal')">✕</button>
    <h3 id="classModalTitle">Nueva clase</h3>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>Alumno</label>
      <select id="fStudent"></select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="fDate">
      </div>
      <div class="form-group">
        <label>Hora</label>
        <input type="time" id="fTime">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Duración (h)</label>
        <input type="number" id="fDuration" step="0.5" min="0.5" value="1">
      </div>
      <div class="form-group">
        <label>Estado</label>
        <select id="fPaid">
          <option value="false">Pendiente</option>
          <option value="true">Pagado</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary btn-full" onclick="saveClass()">Guardar</button>
  </div>
</div>

<!-- MODAL ALUMNO -->
<div class="overlay" id="studentModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('studentModal')">✕</button>
    <h3>Nuevo alumno</h3>
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" id="sName" placeholder="Ej: María García">
    </div>
    <div class="form-group">
      <label>Precio / hora (€)</label>
      <input type="number" id="sRate" step="0.5" min="0" placeholder="Ej: 15">
    </div>
    <div class="form-group">
      <label>Notas</label>
      <textarea id="sNotes" placeholder="Nivel, asignatura..."></textarea>
    </div>
    <button class="btn btn-primary btn-full" onclick="saveStudent()">Añadir alumno</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // --- DATA ---
  function load(k) {
    try { const r = localStorage.getItem(k); const p = r ? JSON.parse(r) : []; return Array.isArray(p) ? p : []; }
    catch { return []; }
  }
  function save() {
    localStorage.setItem('mc_students', JSON.stringify(students));
    localStorage.setItem('mc_classes', JSON.stringify(classes));
  }
  function norm(v) {
    if (typeof v === 'boolean') return v;
    return String(v).toLowerCase() === 'true';
  }
  function esc(v) {
    return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let students = load('mc_students').map(s => ({ ...s, rate: Number(s.rate) || 0 }));
  let classes  = load('mc_classes').map(c => ({ ...c, duration: Number(c.duration)||0, total: Number(c.total)||0, paid: norm(c.paid) }));

  // --- MONTH SELECTOR ---
  let selMonth, selYear;
  (function initMonth() {
    const now = new Date();
    selMonth = now.getMonth(); selYear = now.getFullYear();
    const sel = document.getElementById('monthSel');
    const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    for (let y = now.getFullYear(); y >= now.getFullYear() - 2; y--) {
      for (let m = (y === now.getFullYear() ? now.getMonth() : 11); m >= 0; m--) {
        const o = document.createElement('option');
        o.value = `${y}-${m}`;
        o.textContent = `${months[m]} ${y}`;
        if (y === now.getFullYear() && m === now.getMonth()) o.selected = true;
        sel.appendChild(o);
      }
    }
    sel.addEventListener('change', () => {
      const [y, m] = sel.value.split('-').map(Number);
      selYear = y; selMonth = m;
      render();
    });
  })();

  // --- DATE HELPERS ---
  function parseDate(s) {
    const [y,m,d] = (s||'').split('-').map(Number);
    if (!y||!m||!d) return null;
    return new Date(y, m-1, d);
  }
  function todayMidnight() { const d = new Date(); d.setHours(0,0,0,0); return d; }
  function isFuture(s) { const d = parseDate(s); return d && d > todayMidnight(); }
  function isToday(s) { const d = parseDate(s); if (!d) return false; const t = todayMidnight(); return d.getTime() === t.getTime(); }
  function fmtDate(s) {
    const d = parseDate(s); if (!d) return s;
    return d.toLocaleDateString('es', { day: 'numeric', month: 'short' });
  }

  // --- MONTH FILTER ---
  function inSelMonth(c) {
    return c.date && c.date.startsWith(`${selYear}-${String(selMonth+1).padStart(2,'0')}`);
  }

  // --- RENDER METRICS ---
  function renderMetrics() {
    const mc = classes.filter(inSelMonth);
    const income  = mc.filter(c => c.paid).reduce((s,c) => s + c.total, 0);
    const pending = mc.filter(c => !c.paid).reduce((s,c) => s + c.total, 0);
    const hours   = mc.reduce((s,c) => s + c.duration, 0);
    document.getElementById('statIncome').textContent  = income.toFixed(2) + '€';
    document.getElementById('statPending').textContent = pending.toFixed(2) + '€';
    document.getElementById('statHours').textContent   = (Number.isInteger(hours) ? hours : hours.toFixed(1)) + 'h';
    document.getElementById('statCount').textContent   = mc.length;
  }

  // --- RENDER CLASSES ---
  let activeFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      activeFilter = btn.dataset.f;
      renderClasses();
    });
  });

  function renderClasses() {
    const tbody = document.getElementById('classesBody');
    tbody.innerHTML = '';

    let list = classes.filter(inSelMonth);
    if (activeFilter === 'pending') list = list.filter(c => !c.paid);
    if (activeFilter === 'paid')    list = list.filter(c => c.paid);
    if (activeFilter === 'future')  list = list.filter(c => isFuture(c.date) || isToday(c.date));

    list.sort((a,b) => {
      const da = `${a.date}T${a.time||'00:00'}`, db = `${b.date}T${b.time||'00:00'}`;
      return db.localeCompare(da);
    });

    if (!list.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Sin clases para este período.</td></tr>';
      return;
    }

    const futureItems = list.filter(c => isFuture(c.date) || isToday(c.date)).reverse();
    const pastItems   = list.filter(c => !isFuture(c.date) && !isToday(c.date));

    if (futureItems.length) {
      tbody.innerHTML += `<tr><td colspan="6" class="section-label"><span class="section-dot dot-future"></span>Próximas</td></tr>`;
      futureItems.forEach(c => tbody.innerHTML += classRow(c, true));
    }
    if (pastItems.length) {
      tbody.innerHTML += `<tr><td colspan="6" class="section-label"><span class="section-dot dot-past"></span>Realizadas</td></tr>`;
      pastItems.forEach(c => tbody.innerHTML += classRow(c, false));
    }
  }

  function classRow(c, future) {
    const badge = future
      ? `<span class="badge badge-future">Próxima</span>`
      : (c.paid ? `<span class="badge badge-paid">Pagado</span>` : `<span class="badge badge-pend">Pendiente</span>`);

    const payBtn = (!future && !c.paid)
      ? `<button class="pay-btn" onclick="togglePay('${c.id}')">Cobrar</button>`
      : (!future && c.paid ? `<button class="pay-btn" onclick="togglePay('${c.id}')">Revertir</button>` : '');

    return `<tr class="${future ? 'future' : 'past'}">
      <td class="date-cell">${fmtDate(c.date)}${c.time ? `<span class="time">${c.time}</span>` : ''}</td>
      <td class="name-cell">${esc(c.studentName)}</td>
      <td>${c.duration}h</td>
      <td class="total-cell">${c.total.toFixed(2)}€</td>
      <td>${badge}</td>
      <td><div class="row-actions">
        ${payBtn}
        <button onclick="openEditClass('${c.id}')">Editar</button>
        <button class="del-btn" onclick="deleteClass('${c.id}')">✕</button>
      </div></td>
    </tr>`;
  }

  // --- RENDER STUDENTS SIDEBAR ---
  function renderStudents() {
    const list = document.getElementById('studentsList');
    const cnt  = document.getElementById('studentCount');
    list.innerHTML = '';
    cnt.textContent = students.length + ' activo' + (students.length !== 1 ? 's' : '');

    if (!students.length) {
      list.innerHTML = '<div style="padding:16px;font-size:12px;color:var(--text3);text-align:center">Sin alumnos todavía.</div>';
      document.getElementById('totalDebt').textContent = '0€';
      document.getElementById('totalDebtSub').textContent = 'Sin saldo pendiente';
      return;
    }

    let totalDebt = 0, debtors = 0;
    students.forEach(s => {
      const debt = classes.filter(c => c.studentId === s.id && !c.paid).reduce((sum,c) => sum + c.total, 0);
      const total = classes.filter(c => c.studentId === s.id).length;
      if (debt > 0) { totalDebt += debt; debtors++; }
      list.innerHTML += `
        <div class="alumno-item">
          <div>
            <div class="alumno-name">${esc(s.name)}</div>
            <div class="alumno-sub">${s.rate}€/h · ${total} clase${total !== 1 ? 's' : ''}</div>
          </div>
          <div style="text-align:right">
            ${debt > 0 ? `<div class="alumno-debt">${debt.toFixed(2)}€</div>` : `<div class="alumno-ok">Al día</div>`}
            <button class="btn btn-sm" style="margin-top:4px;font-size:10px;padding:2px 8px" onclick="deleteStudent('${s.id}')">Borrar</button>
          </div>
        </div>`;
    });

    document.getElementById('totalDebt').textContent = totalDebt.toFixed(2) + '€';
    document.getElementById('totalDebtSub').textContent = debtors > 0
      ? `${debtors} alumno${debtors !== 1 ? 's' : ''} con saldo pendiente`
      : 'Sin saldo pendiente';
  }

  function render() { renderMetrics(); renderClasses(); renderStudents(); }

  // --- STUDENT DROPDOWN ---
  function updateDropdown() {
    const sel = document.getElementById('fStudent');
    if (!students.length) {
      sel.innerHTML = '<option value="">Sin alumnos</option>';
      return;
    }
    sel.innerHTML = students.map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('');
  }

  // --- MODALS ---
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  document.querySelectorAll('.overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.querySelectorAll('.overlay.open').forEach(el => el.classList.remove('open'));
  });

  function openClassModal() {
    if (!students.length) { toast('Añade un alumno primero.'); return; }
    document.getElementById('editId').value = '';
    document.getElementById('classModalTitle').textContent = 'Nueva clase';
    document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
    document.getElementById('fTime').value = '';
    document.getElementById('fDuration').value = '1';
    document.getElementById('fPaid').value = 'false';
    updateDropdown();
    openModal('classModal');
  }

  function openEditClass(id) {
    const c = classes.find(x => x.id === id); if (!c) return;
    document.getElementById('editId').value = id;
    document.getElementById('classModalTitle').textContent = 'Editar clase';
    updateDropdown();
    document.getElementById('fStudent').value  = c.studentId;
    document.getElementById('fDate').value     = c.date;
    document.getElementById('fTime').value     = c.time || '';
    document.getElementById('fDuration').value = c.duration;
    document.getElementById('fPaid').value     = c.paid ? 'true' : 'false';
    openModal('classModal');
  }

  // --- SAVE CLASS ---
  function saveClass() {
    const studentId = document.getElementById('fStudent').value;
    const student   = students.find(s => s.id === studentId);
    if (!student) { toast('Selecciona un alumno.'); return; }
    const duration = parseFloat(document.getElementById('fDuration').value);
    if (!duration || duration <= 0) { toast('Duración inválida.'); return; }
    const date = document.getElementById('fDate').value;
    if (!date) { toast('Indica la fecha.'); return; }

    const data = {
      studentId, studentName: student.name,
      date, time: document.getElementById('fTime').value,
      duration, rate: student.rate, total: duration * student.rate,
      paid: document.getElementById('fPaid').value === 'true'
    };

    const editId = document.getElementById('editId').value;
    if (editId) {
      const idx = classes.findIndex(c => c.id === editId);
      if (idx !== -1) classes[idx] = { ...classes[idx], ...data };
    } else {
      classes.push({ id: Date.now().toString(), ...data });
    }
    save(); render(); closeModal('classModal');
    toast(editId ? 'Clase actualizada.' : 'Clase registrada.');
  }

  // --- SAVE STUDENT ---
  function saveStudent() {
    const name = document.getElementById('sName').value.trim();
    const rate = parseFloat(document.getElementById('sRate').value);
    if (!name) { toast('Escribe un nombre.'); return; }
    if (!rate || rate < 0) { toast('Precio inválido.'); return; }
    students.push({ id: Date.now().toString(), name, rate, notes: document.getElementById('sNotes').value });
    document.getElementById('sName').value = '';
    document.getElementById('sRate').value = '';
    document.getElementById('sNotes').value = '';
    save(); render(); updateDropdown(); closeModal('studentModal');
    toast('Alumno añadido.');
  }

  // --- ACTIONS ---
  function togglePay(id) {
    const c = classes.find(x => x.id === id); if (!c) return;
    c.paid = !c.paid;
    save(); render();
    toast(c.paid ? 'Marcado como pagado.' : 'Marcado como pendiente.');
  }

  function deleteClass(id) {
    classes = classes.filter(c => c.id !== id);
    save(); render(); toast('Clase eliminada.');
  }

  function deleteStudent(id) {
    if (!confirm('¿Borrar alumno y todas sus clases?')) return;
    students = students.filter(s => s.id !== id);
    classes  = classes.filter(c => c.studentId !== id);
    save(); render(); updateDropdown(); toast('Alumno eliminado.');
  }

  // --- TOAST ---
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  // --- INIT ---
  render();
  updateDropdown();
</script>
</body>
</html>
